name: 'Doc Pilot'
description: 'PR documentation gate for README, docs, and changelog updates'
author: 'DocPilot'

branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  openai_api_key:
    description: 'OpenAI API key for LLM-powered analysis'
    required: true
  github_token:
    description: 'GitHub token for PR interactions'
    required: false
    default: ${{ github.token }}
  model:
    description: 'OpenAI model to use for analysis'
    required: false
    default: 'gpt-4o-mini'
  doc_paths:
    description: 'Comma-separated list of doc files or directories to check (directories end with /). The built-in default covers README.md, docs/, CHANGELOG.md, and UPGRADING.md, then auto-discovers up to 3 extra top-level doc-rich directories unless you override doc_paths explicitly.'
    required: false
    default: ''
  mode:
    description: 'Operation mode: "report" writes a step summary without PR writes, "suggest" posts a PR comment, and "auto-update" commits changes directly to the PR branch'
    required: false
    default: 'suggest'
  fail_on_impact:
    description: 'Optional quality gate. When set to minor, moderate, or major, the action marks the run failed if the detected documentation impact meets or exceeds that level.'
    required: false
    default: ''
  comment_on_no_impact:
    description: 'Set to "true" to keep all-clear comments when no documentation changes are needed. Default is quiet mode.'
    required: false
    default: 'false'

outputs:
  impact:
    description: 'Overall documentation impact level: none, minor, moderate, or major'
  docs_updated:
    description: 'Number of documentation files that need updates'
  summary:
    description: 'Short summary of the PR changes and documentation impact'

runs:
  using: 'node20'
  main: 'dist/index.js'
