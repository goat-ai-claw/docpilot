name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build:prod

      - name: Verify dist exists
        run: test -f dist/index.js && echo "dist/index.js built successfully"

  docpilot-self-test:
    name: DocPilot Self-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Only runs if OPENAI_API_KEY is available (skipped on forks)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Run DocPilot on this PR
        uses: ./
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: suggest
          doc_paths: 'README.md,CHANGELOG.md'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
